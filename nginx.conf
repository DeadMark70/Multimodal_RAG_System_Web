upstream backend_api {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 200m;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co https://*.googleusercontent.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    # FastAPI reverse proxy (includes SSE endpoints)
    location ~ ^/(pdfmd|rag|imagemd|multimodal|stats|graph|api)/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Vite SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
